<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arabiyah Quest MTs</title>
  <style>
    :root {
      --slate: #0f172a;
      --violet: #8b5cf6;
      --pink: #ec4899;
      --orange: #fb923c;
      --yellow: #fde68a;
      --cream: #fff7e6;
      --cyan: #67e8f9;
      --lime: #bef264;
      --rose: #fecdd3;
      --shadow-dark: rgba(15, 23, 42, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--slate);
      background: var(--cream);
    }

    button {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .dots::before,
    .grid-bg::before,
    .dark-dots::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .dots::before {
      opacity: 0.45;
      background-image: radial-gradient(#111827 1px, transparent 1px);
      background-size: 24px 24px;
    }

    .grid-bg::before {
      opacity: 0.3;
      background-image:
        linear-gradient(#111827 1px, transparent 1px),
        linear-gradient(90deg, #111827 1px, transparent 1px);
      background-size: 36px 36px;
    }

    .dark-dots::before {
      opacity: 0.2;
      background-image: radial-gradient(#facc15 1.5px, transparent 1.5px);
      background-size: 26px 26px;
    }

    .container {
      width: min(100% - 32px, 1180px);
      margin: 0 auto;
      padding: 32px 0;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-logo {
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      transform: rotate(-4deg);
      border-radius: 18px;
      background: var(--violet);
      color: #fff;
      border: 4px solid var(--slate);
      box-shadow: 5px 5px 0 rgba(15, 23, 42, 0.22);
      font-size: 30px;
      font-weight: 900;
    }

    .eyebrow {
      color: #6d28d9;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 2px;
    }

    h1, h2, h3, p {
      margin: 0;
    }

    .brand-title {
      font-size: 20px;
      font-weight: 900;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 2px solid var(--slate);
      background: #fff;
      border-radius: 999px;
      box-shadow: 3px 3px 0 rgba(15, 23, 42, 0.15);
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 900;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 24px;
      align-items: stretch;
    }

    .card {
      position: relative;
      border: 4px solid var(--slate);
      border-radius: 32px;
      background: #fff;
      box-shadow: 12px 12px 0 var(--shadow-dark);
      padding: 32px;
    }

    .hero-title {
      margin-top: 22px;
      max-width: 780px;
      font-size: clamp(36px, 5vw, 64px);
      line-height: 1.02;
      letter-spacing: -0.04em;
      font-weight: 950;
    }

    .lead {
      margin-top: 20px;
      max-width: 700px;
      color: #475569;
      font-size: 18px;
      line-height: 1.7;
    }

    .mini-grid {
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .mini-card {
      border: 3px solid var(--slate);
      border-radius: 24px;
      padding: 16px;
      box-shadow: 5px 5px 0 rgba(15, 23, 42, 0.18);
    }

    .mini-card:nth-child(1) { background: #fce7f3; transform: rotate(-1deg); }
    .mini-card:nth-child(2) { background: #cffafe; transform: rotate(1deg); }
    .mini-card:nth-child(3) { background: #ecfccb; transform: rotate(-1deg); }

    .mini-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .mini-title {
      font-weight: 900;
    }

    .mini-text {
      color: #64748b;
      font-size: 14px;
      margin-top: 4px;
      line-height: 1.5;
    }

    .mascot-panel {
      min-height: 430px;
      position: relative;
      overflow: hidden;
      border: 4px solid var(--slate);
      border-radius: 32px;
      box-shadow: 12px 12px 0 rgba(15, 23, 42, 0.22);
      padding: 26px;
      background: linear-gradient(135deg, #8b5cf6, #f472b6, #fdba74);
    }

    .pill-white {
      position: absolute;
      left: 20px;
      top: 20px;
      border: 2px solid rgba(255, 255, 255, 0.45);
      background: rgba(255, 255, 255, 0.25);
      color: white;
      border-radius: 999px;
      padding: 9px 16px;
      font-size: 14px;
      font-weight: 900;
    }

    .blob {
      position: absolute;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
    }

    .blob.one { right: -56px; top: -56px; width: 176px; height: 176px; }
    .blob.two { left: -56px; bottom: -56px; width: 208px; height: 208px; background: rgba(254, 240, 138, 0.5); }

    .message-card {
      width: min(100%, 380px);
      margin: 20px auto 0;
      transform: rotate(-1deg);
      border: 4px solid var(--slate);
      border-radius: 26px;
      background: #fff;
      padding: 20px;
      text-align: center;
      box-shadow: 8px 8px 0 rgba(15, 23, 42, 0.22);
    }

    .message-card .small {
      color: #7c3aed;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 13px;
      font-weight: 900;
    }

    .message-card h2 {
      margin-top: 4px;
      font-size: 26px;
      font-weight: 950;
    }

    .message-card p {
      margin-top: 8px;
      color: #64748b;
      font-size: 14px;
      line-height: 1.55;
    }

    .lesson-grid {
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .lesson-card {
      position: relative;
      border: 4px solid var(--slate);
      border-radius: 28px;
      padding: 20px;
      box-shadow: 8px 8px 0 rgba(15, 23, 42, 0.18);
    }

    .lesson-card:nth-child(odd) { transform: rotate(-0.7deg); }
    .lesson-card:nth-child(even) { transform: rotate(0.7deg); }

    .lesson-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .lesson-kicker {
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 12px;
      font-weight: 900;
    }

    .lesson-title {
      margin-top: 4px;
      font-size: 20px;
      line-height: 1.15;
      font-weight: 950;
    }

    .sticker {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: #fff;
      border: 3px solid var(--slate);
      box-shadow: 3px 3px 0 rgba(15, 23, 42, 0.2);
      font-size: 30px;
      flex: 0 0 auto;
    }

    .tag {
      display: inline-flex;
      margin-top: 12px;
      padding: 5px 11px;
      border: 2px solid var(--slate);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      font-size: 12px;
      font-weight: 900;
    }

    .lesson-subtitle {
      min-height: 64px;
      margin-top: 12px;
      color: #475569;
      font-size: 14px;
      line-height: 1.55;
    }

    .btn {
      border: 2px solid var(--slate);
      border-radius: 18px;
      padding: 12px 16px;
      font-weight: 950;
      cursor: pointer;
      transition: 0.12s ease;
      min-height: 48px;
      text-align: center;
    }

    .btn:active {
      transform: translate(4px, 4px);
      box-shadow: none !important;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--slate);
      color: #fff;
      box-shadow: 5px 5px 0 rgba(109, 40, 217, 0.55);
    }

    .btn-primary:hover { background: #6d28d9; }

    .btn-soft {
      background: #fff;
      color: var(--slate);
      box-shadow: 4px 4px 0 rgba(15, 23, 42, 0.16);
    }

    .btn-soft:hover { background: #fefce8; }

    .btn-accent {
      background: #fde047;
      color: var(--slate);
      box-shadow: 5px 5px 0 rgba(15, 23, 42, 0.22);
    }

    .btn-accent:hover { background: #facc15; }

    .full { width: 100%; }

    .bonus {
      margin-top: 28px;
      position: relative;
      overflow: hidden;
      border: 4px solid var(--slate);
      border-radius: 28px;
      background: var(--slate);
      color: #fff;
      padding: 24px;
      box-shadow: 10px 10px 0 rgba(124, 58, 237, 0.35);
    }

    .bonus::after {
      content: "";
      position: absolute;
      right: 0;
      top: 0;
      width: 144px;
      height: 144px;
      background: rgba(139, 92, 246, 0.5);
      border-bottom-left-radius: 999px;
    }

    .bonus-inner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 22px;
    }

    .bonus-left {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .bonus .small {
      color: #fde047;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 13px;
      font-weight: 900;
    }

    .bonus h3 {
      margin-top: 4px;
      font-size: 28px;
      font-weight: 950;
    }

    .bonus p {
      margin-top: 6px;
      max-width: 720px;
      color: rgba(255, 255, 255, 0.75);
      line-height: 1.6;
    }

    .tape {
      position: absolute;
      height: 28px;
      width: 80px;
      background: rgba(254, 240, 138, 0.8);
      border: 1px solid #fde047;
      border-radius: 4px;
      transform: rotate(-8deg);
      z-index: 3;
    }

    .tape.t1 { left: 48px; top: -12px; }
    .tape.t2 { right: 64px; bottom: -12px; transform: rotate(6deg); }
    .tape.t3 { left: 32px; top: -12px; transform: rotate(-8deg) scale(0.75); }
    .tape.t4 { right: 48px; top: -12px; transform: rotate(6deg); }

    .gradient-1 { background: linear-gradient(135deg, #fed7aa, #fef3c7, #fce7f3); }
    .gradient-2 { background: linear-gradient(135deg, #a5f3fc, #dbeafe, #e0e7ff); }
    .gradient-3 { background: linear-gradient(135deg, #d9f99d, #d1fae5, #ccfbf1); }
    .gradient-4 { background: linear-gradient(135deg, #f5d0fe, #fce7f3, #ffe4e6); }

    /* Mascots */
    .rafi {
      position: relative;
      width: 176px;
      height: 176px;
      margin: 48px auto 0;
      user-select: none;
    }

    .rafi .face {
      position: absolute;
      left: 24px;
      top: 32px;
      width: 128px;
      height: 128px;
      transform: rotate(3deg);
      border-radius: 34px;
      background: #fff;
      border: 4px solid var(--slate);
      box-shadow: 8px 8px 0 rgba(15, 23, 42, 0.18);
    }

    .rafi .hat {
      position: absolute;
      left: 40px;
      top: 8px;
      width: 96px;
      height: 48px;
      transform: rotate(-6deg);
      border-radius: 999px;
      background: #8b5cf6;
      border: 4px solid var(--slate);
      box-shadow: 4px 4px 0 rgba(15, 23, 42, 0.2);
    }

    .rafi .hand-left,
    .rafi .hand-right {
      position: absolute;
      top: 72px;
      width: 48px;
      height: 48px;
      border-radius: 999px;
      background: #fde047;
      border: 4px solid var(--slate);
    }

    .rafi .hand-left { left: 4px; transform: rotate(-12deg); }
    .rafi .hand-right { right: 4px; transform: rotate(12deg); }

    .rafi svg {
      position: absolute;
      left: 40px;
      top: 60px;
      z-index: 2;
    }

    .rafi .body {
      position: absolute;
      left: 48px;
      bottom: 0;
      width: 88px;
      height: 64px;
      transform: rotate(-2deg);
      border-radius: 28px;
      background: #22d3ee;
      border: 4px solid var(--slate);
      box-shadow: 5px 5px 0 rgba(15, 23, 42, 0.18);
    }

    .rafi .arabic-letter {
      position: absolute;
      left: 70px;
      bottom: 22px;
      font-size: 30px;
      z-index: 3;
      font-weight: 900;
    }

    .rafi .name-tag {
      position: absolute;
      right: 0;
      top: 12px;
      transform: rotate(12deg);
      border: 3px solid var(--slate);
      border-radius: 18px;
      background: #fde047;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 950;
      box-shadow: 3px 3px 0 rgba(15, 23, 42, 0.25);
    }

    .rafi .bubble {
      position: absolute;
      left: 0;
      bottom: 32px;
      transform: rotate(-12deg);
      border: 3px solid var(--slate);
      border-radius: 999px;
      background: #f472b6;
      color: white;
      padding: 5px 12px;
      font-size: 14px;
      font-weight: 950;
      z-index: 4;
    }

    .lulu {
      position: relative;
      width: 112px;
      height: 112px;
      user-select: none;
      flex: 0 0 auto;
    }

    .lulu .head {
      position: absolute;
      left: 12px;
      top: 20px;
      width: 80px;
      height: 80px;
      border-radius: 30px;
      background: #fff;
      border: 4px solid var(--slate);
      box-shadow: 5px 5px 0 rgba(15, 23, 42, 0.22);
    }

    .lulu .ear {
      position: absolute;
      top: 4px;
      width: 36px;
      height: 36px;
      border-radius: 20px 20px 0 0;
      background: #fff;
      border: 4px solid var(--slate);
    }

    .lulu .ear.left { left: 16px; transform: rotate(-12deg); }
    .lulu .ear.right { right: 20px; transform: rotate(12deg); }

    .lulu .eye {
      position: absolute;
      top: 52px;
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: var(--slate);
      z-index: 2;
    }

    .lulu .eye.left { left: 36px; }
    .lulu .eye.right { right: 40px; }

    .lulu .mouth {
      position: absolute;
      left: 52px;
      top: 70px;
      width: 18px;
      height: 8px;
      border-radius: 999px;
      background: #f472b6;
      z-index: 2;
    }

    .lulu .label {
      position: absolute;
      left: 20px;
      bottom: 0;
      transform: rotate(-6deg);
      border: 2px solid var(--slate);
      border-radius: 12px;
      background: #8b5cf6;
      color: white;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 950;
      z-index: 3;
    }

    /* Lesson screen */
    .lesson-screen {
      min-height: 100vh;
      padding: 32px 16px;
      position: relative;
      overflow: hidden;
    }

    .lesson-container {
      width: min(100%, 1120px);
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .lesson-top {
      margin-bottom: 20px;
      border: 4px solid var(--slate);
      border-radius: 28px;
      background: #fff;
      box-shadow: 7px 7px 0 rgba(15, 23, 42, 0.18);
      padding: 18px;
    }

    .lesson-top-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .back {
      border: 0;
      background: transparent;
      color: #6d28d9;
      font-size: 14px;
      font-weight: 950;
      cursor: pointer;
      padding: 0;
    }

    .back:hover {
      text-decoration: underline;
    }

    .lesson-main-title {
      margin-top: 6px;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1.1;
      font-weight: 950;
    }

    .stat-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .stat {
      border: 3px solid var(--slate);
      border-radius: 16px;
      padding: 10px 16px;
      box-shadow: 3px 3px 0 rgba(15, 23, 42, 0.18);
      font-weight: 950;
    }

    .stat.score { background: #fde68a; }
    .stat.energy { background: #fbcfe8; }

    .progress {
      margin-top: 16px;
      height: 16px;
      border-radius: 999px;
      overflow: hidden;
      background: #fff;
      border: 2px solid var(--slate);
      box-shadow: 3px 3px 0 rgba(15, 23, 42, 0.2);
    }

    .progress-fill {
      height: 100%;
      border-radius: 0 999px 999px 0;
      background: linear-gradient(90deg, #8b5cf6, #ec4899, #fb923c);
      transition: width 0.5s ease;
    }

    .question-grid {
      display: grid;
      grid-template-columns: 0.8fr 1.2fr;
      gap: 20px;
    }

    .side-card,
    .question-card {
      position: relative;
      border: 4px solid var(--slate);
      border-radius: 32px;
      background: #fff;
      box-shadow: 9px 9px 0 rgba(15, 23, 42, 0.2);
      padding: 22px;
    }

    .side-card {
      text-align: center;
    }

    .side-card .rafi { margin-top: 20px; }

    .side-card h2 {
      margin-top: 12px;
      font-size: 26px;
      font-weight: 950;
    }

    .side-card p {
      margin-top: 8px;
      color: #64748b;
      line-height: 1.6;
    }

    .hint {
      margin-top: 16px;
      transform: rotate(-1deg);
      border: 3px solid var(--slate);
      border-radius: 18px;
      background: #fef3c7;
      box-shadow: 4px 4px 0 rgba(15, 23, 42, 0.16);
      padding: 14px;
      font-size: 14px;
      line-height: 1.55;
      font-weight: 700;
      text-align: left;
    }

    .question-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .question-title {
      margin-top: 18px;
      font-size: 25px;
      line-height: 1.25;
      font-weight: 950;
    }

    .arabic-box {
      margin-top: 20px;
      border: 4px solid var(--slate);
      border-radius: 24px;
      background: var(--slate);
      color: #fff;
      padding: 28px 20px;
      text-align: center;
      font-size: clamp(40px, 7vw, 64px);
      line-height: 1.4;
      font-weight: 950;
      box-shadow: inset 0 2px 12px rgba(0,0,0,0.35);
    }

    .feedback {
      margin-top: 16px;
      border: 3px solid var(--slate);
      border-radius: 18px;
      box-shadow: 4px 4px 0 rgba(15, 23, 42, 0.16);
      padding: 14px;
      text-align: center;
      font-weight: 950;
    }

    .feedback.correct { background: #d9f99d; }
    .feedback.wrong { background: #fecdd3; }

    .options-grid {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .options-grid .btn:nth-child(odd) { transform: rotate(-0.5deg); }
    .options-grid .btn:nth-child(even) { transform: rotate(0.5deg); }

    .answer-box {
      min-height: 96px;
      margin-top: 20px;
      border: 4px dashed #a78bfa;
      border-radius: 18px;
      background: #f5f3ff;
      padding: 12px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .placeholder {
      color: #94a3b8;
      font-weight: 700;
    }

    .word-chip {
      border: 2px solid var(--slate);
      border-radius: 12px;
      background: #fff;
      box-shadow: 3px 3px 0 rgba(15, 23, 42, 0.16);
      padding: 8px 12px;
      font-weight: 950;
      cursor: pointer;
    }

    .word-grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .action-row {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .action-row .btn:first-child {
      flex: 1;
    }

    /* Result */
    .center-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
      position: relative;
      z-index: 1;
    }

    .result-card {
      width: min(100%, 580px);
      text-align: center;
    }

    .result-card .rafi {
      margin-top: 12px;
    }

    .result-card h1 {
      margin-top: 16px;
      font-size: 42px;
      font-weight: 950;
    }

    .result-card p {
      margin-top: 8px;
      color: #64748b;
      line-height: 1.6;
    }

    .award {
      margin-top: 22px;
      border: 4px solid var(--slate);
      border-radius: 24px;
      background: #fef3c7;
      box-shadow: 6px 6px 0 rgba(15, 23, 42, 0.18);
      padding: 20px;
    }

    .award-icon {
      font-size: 52px;
    }

    .award-title {
      margin-top: 8px;
      font-size: 20px;
      font-weight: 950;
    }

    .award-text {
      margin-top: 4px;
      color: #64748b;

    .two-buttons {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    /* Match game */
    .match-screen {
      min-height: 100vh;
      background: #020617;
      color: #fff;
      padding: 32px 16px;
      position: relative;
      overflow: hidden;
    }

    .match-container {
      width: min(100%, 1120px);
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .match-top {
      margin-bottom: 20px;
      border: 4px solid var(--slate);
      border-radius: 28px;
      background: #fff;
      color: var(--slate);
      box-shadow: 8px 8px 0 rgba(250, 204, 21, 0.5);
      padding: 18px;
    }

    .match-grid {
      display: grid;
      grid-template-columns: 0.7fr 1.3fr;
      gap: 20px;
    }

    .lulu-panel {
      border: 4px solid var(--slate);
      border-radius: 32px;
      background: #8b5cf6;
      box-shadow: 10px 10px 0 rgba(250, 204, 21, 0.45);
      padding: 22px;
    }

    .lulu-panel h2 {
      margin-top: 16px;
      font-size: 26px;
      font-weight: 950;
    }

    .lulu-panel p {
      margin-top: 8px;
      color: rgba(255,255,255,0.88);
      line-height: 1.65;
    }

    .finish-msg {
      margin-top: 16px;
      border: 3px solid var(--slate);
      border-radius: 18px;
      background: #d9f99d;
      color: var(--slate);
      box-shadow: 4px 4px 0 rgba(15,23,42,0.18);
      padding: 14px;
      font-weight: 950;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }

    .memory-card {
      min-height: 120px;
      border-radius: 24px;
      border: 4px solid #fff;
      background: #1e293b;
      color: #fff;
      box-shadow: 6px 6px 0 rgba(124, 58, 237, 0.6);
      padding: 12px;
      text-align: center;
      cursor: pointer;
      transition: 0.12s ease;
      display: grid;
      place-items: center;
      font-weight: 950;
    }

    .memory-card:nth-child(odd) { transform: rotate(-0.8deg); }
    .memory-card:nth-child(even) { transform: rotate(0.8deg); }

    .memory-card.open {
      background: #fff;
      color: var(--slate);
      border-color: var(--slate);
      box-shadow: 6px 6px 0 rgba(250, 204, 21, 0.5);
    }

    .memory-card:active {
      transform: translate(4px,4px);
      box-shadow: none;
    }

    .card-text {
      font-size: 18px;
    }

    .memory-card.open .card-text.arabic {
      font-size: 34px;
    }

    .card-type {
      margin-top: 8px;
      color: #64748b;
      font-size: 12px;
      font-weight: 700;
    }

    @media (max-width: 980px) {
      .hero-grid,
      .question-grid,
      .match-grid {
        grid-template-columns: 1fr;
      }

      .lesson-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .cards-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 680px) {
      .container {
        width: min(100% - 24px, 1180px);
        padding: 18px 0;
      }

      .card,
      .mascot-panel,
      .side-card,
      .question-card,
      .lesson-top,
      .match-top,
      .lulu-panel {
        padding: 18px;
      }

      .mini-grid,

        grid-template-columns: 1fr;
      }

      .bonus-inner,
      .bonus-left {
        flex-direction: column;
        align-items: flex-start;
      }

      .cards-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .action-row {
        flex-direction: column;
      }
    }

      lesson: null,
      match: null

    function shuffle(list) {
      return [...list].sort(() => Math.random() - 0.5);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function rafiMascot(mood = "happy") {
      const mouth = mood === "sad" ? "M24 62 Q40 51 56 62" : "M24 54 Q40 70 56 54";

        <div class="rafi" aria-hidden="true">
          <div class="face"></div>
          <div class="hat"></div>
          <div class="hand-left"></div>
          <div class="hand-right"></div>

      return `<span class="badge">${escapeHtml(text)}</span>`;

    function progressBar(value) {
      const safeValue = Math.max(0, Math.min(100, value));
      return `<div class="progress"><div class="progress-fill" style="width: ${safeValue}%"></div></div>`;
    }

    function initLesson(lessonId) {
      state.activeLessonId = lessonId;
      state.lesson = {
        index: 0,
        score: 0,
        lives: 3,
        feedback: null,
        selectedWords: [],
        showHint: false,
        locked: false
      };
    }

    function startLesson(lessonId) {
      initLesson(lessonId);
      state.screen = "lesson";
      render();
    }

    function getActiveLesson() {
      return lessons.find((lesson) => lesson.id === state.activeLessonId);
    }

    function nextQuestion(extraScore = 0, wrong = false) {
      const lesson = getActiveLesson();
      const ls = state.lesson;
      const newScore = ls.score + extraScore;
      const newLives = wrong ? ls.lives - 1 : ls.lives;

      ls.score = newScore;
      ls.lives = newLives;
      ls.feedback = null;
      ls.selectedWords = [];
      ls.showHint = false;
      ls.locked = false;

      if (newLives <= 0) {
        state.lastResult = {
          score: newScore,
          max: lesson.questions.length * 10,
          badge: null,
          failed: true
        };
        state.screen = "result";
        render();
        return;
      }

      if (ls.index + 1 >= lesson.questions.length) {
        state.lastResult = {
          score: newScore,
          max: lesson.questions.length * 10,
          badge: lesson.badge,
          failed: false
        };
        state.screen = "result";
        render();
        return;
      }

      ls.index += 1;
      render();
    }

    function answerChoice(optionIndex) {
      const lesson = getActiveLesson();
      const ls = state.lesson;
      const q = lesson.questions[ls.index];
      if (ls.locked) return;

      const option = q.options[optionIndex];
      const correct = option === q.answer;

      ls.feedback = correct ? "correct" : "wrong";
      ls.locked = true;
      render();

      setTimeout(() => nextQuestion(correct ? 10 : 0, !correct), 750);
    }

    function toggleHint() {
      state.lesson.showHint = !state.lesson.showHint;
      render();
    }

    function tapWord(wordIndex) {
      const lesson = getActiveLesson();
      const ls = state.lesson;
      const q = lesson.questions[ls.index];
      const word = q.options[wordIndex];

      if (ls.locked || ls.selectedWords.includes(word)) return;
      ls.selectedWords.push(word);
      render();
    }

    function removeWord(wordIndex) {
      const ls = state.lesson;
      if (ls.locked) return;
      ls.selectedWords.splice(wordIndex, 1);
      render();
    }

    function resetSentence() {
      if (state.lesson.locked) return;
      state.lesson.selectedWords = [];
      render();
    }

    function checkSentence() {
      const lesson = getActiveLesson();
      const ls = state.lesson;
      const q = lesson.questions[ls.index];

      if (ls.locked || ls.selectedWords.length < 3) return;

      const sentence = ls.selectedWords.join(" ");
      const correct = sentence === q.answer;

      ls.feedback = correct ? "correct" : "wrong";
      ls.locked = true;
      render();

      setTimeout(() => nextQuestion(correct ? 10 : 0, !correct), 850);
    }

    function renderLesson() {
      const lesson = getActiveLesson();
      const ls = state.lesson;
      const q = lesson.questions[ls.index];
      const progress = (ls.index / lesson.questions.length) * 100;
      const mood = ls.feedback === "wrong" ? "sad" : "happy";
      const energy = "⚡".repeat(Math.max(0, ls.lives));

      app.className = "app grid-bg";
      app.innerHTML = `
        <section class="lesson-screen ${lesson.gradient}">
          <div class="lesson-container">
            <div class="lesson-top">
              <div class="lesson-top-inner">
                <div>
                  <button class="back" onclick="goHome()">← Kembali ke beranda</button>
                  <h1 class="lesson-main-title">${escapeHtml(lesson.title)}: ${escapeHtml(lesson.theme)}</h1>
                </div>
                <div class="stat-row">
                  <div class="stat score">Skor ${ls.score}</div>
                  <div class="stat energy">Energi ${energy}</div>
                </div>
              </div>
              ${progressBar(progress)}
            </div>

            <div class="question-grid">
              <aside class="side-card">
                <div class="tape t1"></div>
                ${rafiMascot(mood)}
                <h2>Rafi memberi tantangan</h2>
                <p>Pilih jawaban dengan teliti. Gunakan petunjuk jika kamu mulai ragu.</p>
                <button class="btn btn-soft full" style="margin-top:16px;" onclick="toggleHint()">
                  ${ls.showHint ? "Tutup Petunjuk" : "Lihat Petunjuk"}
                </button>
                ${ls.showHint ? `<div class="hint">💡 ${escapeHtml(q.hint)}</div>` : ""}
              </aside>

              <article class="question-card">
                <div class="tape t4"></div>
                <div class="question-head">
                  ${badge(`Soal ${ls.index + 1} dari ${lesson.questions.length}`)}
                  ${badge(lesson.tag)}
                </div>

                <h2 class="question-title">${escapeHtml(q.prompt)}</h2>
                <div class="arabic-box" dir="rtl">${escapeHtml(q.arabic)}</div>

                ${ls.feedback ? `
                  <div class="feedback ${ls.feedback}">
                    ${ls.feedback === "correct" ? "Benar. Skor bertambah 10." : "Belum tepat. Coba perhatikan petunjuknya."}
                  </div>
                ` : ""}

                ${q.mode === "choice" ? renderChoiceQuestion(q, ls) : renderSentenceQuestion(q, ls)}
              </article>
            </div>
          </div>
        </section>
      `;
    }

    function renderChoiceQuestion(q, ls) {
      return `
        <div class="options-grid">
          ${q.options.map((option, index) => `
            <button class="btn btn-soft" ${ls.locked ? "disabled" : ""} onclick="answerChoice(${index})">
              ${escapeHtml(option)}
            </button>
          `).join("")}
        </div>
      `;
    }

    function renderSentenceQuestion(q, ls) {
      return `
        <div class="answer-box">
          ${ls.selectedWords.length === 0
            ? `<span class="placeholder">Ketuk kata di bawah untuk menyusun jawaban.</span>`
            : ls.selectedWords.map((word, index) => `
                <button class="word-chip" onclick="removeWord(${index})">${escapeHtml(word)}</button>
              `).join("")
          }
        </div>

        <div class="word-grid">
          ${q.options.map((word, index) => `
            <button class="btn btn-soft" ${ls.selectedWords.includes(word) || ls.locked ? "disabled" : ""} onclick="tapWord(${index})">
              ${escapeHtml(word)}
            </button>
          `).join("")}
        </div>

        <div class="action-row">
          <button class="btn btn-primary" ${ls.selectedWords.length < 3 || ls.locked ? "disabled" : ""} onclick="checkSentence()">Periksa Jawaban</button>
          <button class="btn btn-soft" ${ls.locked ? "disabled" : ""} onclick="resetSentence()">Reset</button>
        </div>
      `;
    }

    function renderResult() {
      const result = state.lastResult;
      const percent = Math.round((result.score / result.max) * 100);

      app.className = "app dots";
      app.innerHTML = `
        <div class="center-wrap">
          <article class="card result-card">
            <div class="tape t1"></div>
            ${rafiMascot(result.failed ? "sad" : "happy")}
            <h1>${result.failed ? "Misi Belum Selesai" : "Misi Berhasil"}</h1>
            <p>Skor kamu ${result.score} dari ${result.max}. Nilai latihan ${percent}.</p>
            <div class="award">
              <div class="award-icon">${result.failed ? "💪" : "🏆"}</div>
              <div class="award-title">${result.failed ? "Ulangi misi untuk menguatkan hafalan." : escapeHtml(result.badge)}</div>
              <div class="award-text">Belajar bahasa Arab jadi lebih mudah jika kamu berlatih sedikit demi sedikit.</div>
            </div>
            <div class="two-buttons">
              <button class="btn btn-primary" onclick="replay()">Main Lagi</button>
              <button class="btn btn-soft" onclick="goHome()">Beranda</button>
            </div>
          </article>
        </div>
      `;
    }

    function replay() {
      initLesson(state.activeLessonId);
      state.lastResult = null;
      state.screen = "lesson";
      render();
    }

    function goHome() {
      state.screen = "home";
      state.activeLessonId = null;
      state.lastResult = null;
      state.lesson = null;
      render();
    }

    function makeMatchDeck() {
      const selected = allCards.slice(0, 5);
      const deck = selected.flatMap((item, index) => [
        { id: `a-${index}-${Date.now()}-${Math.random()}`, pair: index, type: "arabic", text: item.arabic },
        { id: `m-${index}-${Date.now()}-${Math.random()}`, pair: index, type: "meaning", text: item.meaning }
      ]);
      return shuffle(deck);
    }

    function openMatch() {
      state.screen = "match";
      state.match = {
        deck: makeMatchDeck(),
        open: [],
        matched: [],
        moves: 0,
        locked: false
      };
      render();
    }

    function resetMatch() {
      state.match = {
        deck: makeMatchDeck(),
        open: [],
        matched: [],
        moves: 0,
        locked: false
      };
      render();
    }

    function tapCard(cardIndex) {
      const match = state.match;
      const card = match.deck[cardIndex];

      if (
        match.locked ||
        match.matched.includes(card.pair) ||
        match.open.some((item) => item.id === card.id) ||
        match.open.length >= 2
      ) {
        return;
      }

      match.open.push(card);

      if (match.open.length === 2) {
        match.moves += 1;
        match.locked = true;
        const isPair = match.open[0].pair === match.open[1].pair && match.open[0].type !== match.open[1].type;

        render();

        setTimeout(() => {
          if (isPair) match.matched.push(match.open[0].pair);
          match.open = [];
          match.locked = false;
          render();
        }, 650);
      } else {
        render();
      }
    }

    function renderMatch() {
      const match = state.match;
      const finished = match.matched.length === 5;

      app.className = "app dark-dots";
      app.innerHTML = `
        <section class="match-screen">
          <div class="match-container">
            <div class="match-top">
              <div class="lesson-top-inner">
                <div>
                  <button class="back" onclick="goHome()">← Kembali ke beranda</button>
                  <h1 class="lesson-main-title">Kartu Pasangan Mufradat</h1>
                  <p style="color:#64748b; margin-top:4px;">Cocokkan kartu Arab dengan arti yang benar.</p>
                </div>
                <div class="stat score">Gerakan ${match.moves}</div>
              </div>
            </div>

            <div class="match-grid">
              <aside class="lulu-panel">
                ${luluMascot()}
                <h2>Pesan Lulu</h2>
                <p>Buka dua kartu. Jika kosakata dan artinya cocok, kartu akan terkunci. Selesaikan semua pasangan untuk menang.</p>
                ${finished ? `<div class="finish-msg">Hebat. Kamu menemukan semua pasangan dalam ${match.moves} gerakan.</div>` : ""}
                <button class="btn btn-accent full" style="margin-top:16px;" onclick="resetMatch()">Acak Ulang</button>
              </aside>

              <div class="cards-grid">
                ${match.deck.map((card, index) => {
                  const isOpen = match.open.some((item) => item.id === card.id) || match.matched.includes(card.pair);
                  return `
                    <button class="memory-card ${isOpen ? "open" : ""}" onclick="tapCard(${index})">
                      <div>
                        <div class="card-text ${card.type === "arabic" ? "arabic" : ""}" dir="${card.type === "arabic" ? "rtl" : "ltr"}">
                          ${isOpen ? escapeHtml(card.text) : "؟"}
                        </div>
                        ${isOpen ? `<div class="card-type">${card.type === "arabic" ? "Arab" : "Arti"}</div>` : ""}
                      </div>
                    </button>
                  `;
                }).join("")}
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function render() {
      if (state.screen === "lesson" && state.activeLessonId) {
        renderLesson();
        return;
      }

      if (state.screen === "result" && state.lastResult) {
        renderResult();
        return;
      }

      if (state.screen === "match") {
        renderMatch();
        return;
      }

      renderHome();
    }

    window.startLesson = startLesson;
    window.answerChoice = answerChoice;
    window.toggleHint = toggleHint;
    window.tapWord = tapWord;
    window.removeWord = removeWord;
    window.resetSentence = resetSentence;
    window.checkSentence = checkSentence;
    window.replay = replay;
    window.goHome = goHome;
    window.openMatch = openMatch;
    window.resetMatch = resetMatch;
    window.tapCard = tapCard;

    render();
  </script>
</body>
</html>
